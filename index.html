<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TaskFlow</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>TaskFlow</h2>

    <button onclick="setDay('today')">Hoje</button>
    <button onclick="setDay('tomorrow')">Amanhã</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <h1 id="title">Hoje</h1>

    <div class="top">
      <input type="text" id="taskInput" placeholder="O que você precisa fazer?">
      <input type="date" id="dateInput">
      <button onclick="addTask()">Adicionar</button>
    </div>

    <ul id="taskList"></ul>

  </main>

</div>

<script src="script.js"></script>
</body>
</html>
